alarm:
  username: "user@email.com"
  password: "password"
  mfaToken: ""  # optional, for 2FA bypass

# Run "npx tsx src/discover.ts" to find your camera IDs and names
cameras:
  - id: "100654376-1079"
    name: "front-door"
    homebridgeName: "Front Door"  # must match the camera name in homebridge-camera-ffmpeg
    quality: "hd"  # hd or sd
  # - id: "100652375-2049"
  #   name: "backyard"
  #   homebridgeName: "Backyard"
  #   quality: "hd"

go2rtc:
  apiUrl: "http://localhost:1984"
  rtspPort: 8554

# Optional: send motion events to homebridge-camera-ffmpeg
# Requires "motion": true and "porthttp" set in the Homebridge plugin config
# homebridge:
#   motionUrl: "http://10.0.0.50:8080"  # homebridge-camera-ffmpeg HTTP server
#   motionTimeoutMs: 60000               # reset motion after 60s of no activity

logging:
  level: "info"  # debug, info, warn, error
